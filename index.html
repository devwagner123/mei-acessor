// ── Chart Hook ───────────────────────────────────────────────────────
function useChart(ref, type, data, options){
  useEffect(()=>{
    if(!ref.current)return;
    const ctx=ref.current.getContext('2d');
    const chart=new Chart(ctx,{type,data,options});
    return()=>chart.destroy();
  },[JSON.stringify(data)]);
}

// ── Login ────────────────────────────────────────────────────────────
function LoginScreen(){
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState('');
  const login=async()=>{
    setLoading(true);setErr('');
    try{await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider())}
    catch{setErr('Erro ao entrar. Tente novamente.');setLoading(false);}
  };
  return(
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100dvh',padding:32,background:'#0F172A'}}>
      <div style={{width:72,height:72,borderRadius:20,background:'linear-gradient(135deg,#3B82F6,#10B981)',display:'flex',alignItems:'center',justifyContent:'center',marginBottom:24,fontSize:36}}>💰</div>

      <div style={{fontSize:14,color:'#64748B',marginBottom:40,textAlign:'center',lineHeight:1.6}}>Gestão financeira MEI{'\n'}com gráficos e Firebase</div>

function Loader(){
  return(
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100dvh',background:'#0F172A'}}>
      <div style={{width:32,height:32,borderRadius:'50%',border:'3px solid rgba(255,255,255,0.1)',borderTop:'3px solid #10B981',animation:'spin 0.8s linear infinite'}}/>
    </div>
  );
}

// ── App ──────────────────────────────────────────────────────────────
function App(){
  const [user,setUser]=useState(undefined);
  const [tab,setTab]=useState('dash');
  const [entries,setEntries]=useState([]);
  const [checklist,setChecklist]=useState([]);
  const [loadingData,setLoadingData]=useState(true);
  const [isWagner,setIsWagner]=useState(false);

  useEffect(()=>auth.onAuthStateChanged(u=>{
    setUser(u??null);
    if(u){
      if(!localStorage.getItem('mei_owner'))localStorage.setItem('mei_owner',u.uid);
      setIsWagner(u.uid===localStorage.getItem('mei_owner'));
    }
  }),[]);

  useEffect(()=>{
    if(!user)return;
    setLoadingData(true);
    const uid=user.uid;
    const owner=uid===localStorage.getItem('mei_owner');
    setIsWagner(owner);
    const unsub=db.collection('users').doc(uid).collection('entries')
      .orderBy('createdAt','desc').onSnapshot(snap=>{
        setEntries(snap.docs.map(d=>({id:d.id,...d.data()})));
        setLoadingData(false);
      },()=>setLoadingData(false));
    db.collection('users').doc(uid).collection('meta').doc('checklist').get().then(doc=>{
      if(doc.exists)setChecklist(doc.data().items||[]);
      else if(owner){setChecklist(WAGNER_CK);db.collection('users').doc(uid).collection('meta').doc('checklist').set({items:WAGNER_CK});}
      else setChecklist([]);
    });
    return()=>unsub();
  },[user]);

  const addEntry=async e=>{if(!user)return;await db.collection('users').doc(user.uid).collection('entries').add({...e,createdAt:firebase.firestore.FieldValue.serverTimestamp()})};
  const delEntry=async id=>{if(!user)return;await db.collection('users').doc(user.uid).collection('entries').doc(id).delete()};
  const saveCk=async ck=>{setChecklist(ck);if(user)await db.collection('users').doc(user.uid).collection('meta').doc('checklist').set({items:ck})};

  if(user===undefined)return <Loader/>;
  if(user===null)return <LoginScreen/>;
  if(loadingData)return <Loader/>;

  const now=new Date(),mes=now.getMonth(),ano=now.getFullYear();
  const filterMes=(k,m,a)=>entries.filter(e=>{const d=new Date((e.date||td())+'T12:00:00');return e.kind===k&&d.getMonth()===m&&d.getFullYear()===a});
  const sumMes=(k,m,a)=>filterMes(k,m,a).reduce((s,e)=>s+(e.amount||0),0);
  const rM=sumMes('income',mes,ano),eM=sumMes('expense',mes,ano),sM=rM-eM;
  const rA=entries.filter(e=>e.kind==='income'&&new Date((e.date||td())+'T12:00:00').getFullYear()===ano).reduce((s,e)=>s+(e.amount||0),0);
  const lP=Math.min(100,(rA/LIMITE_MEI)*100);
  const feitos=checklist.filter(c=>c.feito).length;
  const ckP=checklist.length>0?Math.round((feitos/checklist.length)*100):0;
  const fixasMes=isWagner?WAGNER_FIXAS.reduce((s,f)=>s+f.valor,0):0;
  const cartoesMes=isWagner?WAGNER_CARTOES.filter(c=>c.meses.includes(mes)).reduce((s,c)=>s+c.valor,0):0;

  return(
    <div style={{display:'flex',flexDirection:'column',height:'100dvh',background:'#0F172A',overflow:'hidden'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'12px 16px',paddingTop:'calc(12px + env(safe-area-inset-top,0px))',background:'#1E293B',borderBottom:'0.5px solid rgba(255,255,255,0.06)'}}>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <div style={{width:30,height:30,borderRadius:8,background:'linear-gradient(135deg,#3B82F6,#10B981)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16}}>💰</div>
          <div><div style={{fontSize:14,fontWeight:600}}>MEI Assessor</div><div style={{fontSize:11,color:'#64748B'}}>{user.displayName?.split(' ')[0]||'Usuário'}</div></div>
        </div>
        <button onClick={()=>auth.signOut()} style={{background:'none',border:'none',padding:6,borderRadius:8,display:'flex',color:'#64748B'}}>
          <Ico n="logout" sz={18} c="#64748B"/>
        </button>
      </div>
      <div style={{flex:1,overflow:'hidden',display:'flex',flexDirection:'column'}}>
        {tab==='dash'&&<DashTab rM={rM} eM={eM} sM={sM} rA={rA} lP={lP} isWagner={isWagner} fixasMes={fixasMes} cartoesMes={cartoesMes}/>}
        {tab==='graficos'&&<GraficosTab entries={entries} mes={mes} ano={ano} sumMes={sumMes} isWagner={isWagner}/>}
        {tab==='entries'&&<EntriesTab entries={entries} addEntry={addEntry} delEntry={delEntry}/>}
        {tab==='plan'&&<PlanTab checklist={checklist} saveCk={saveCk} feitos={feitos} ckP={ckP} isWagner={isWagner}/>}
      </div>
      <nav style={{display:'flex',background:'#1E293B',borderTop:'0.5px solid rgba(255,255,255,0.08)',paddingBottom:'env(safe-area-inset-bottom,0px)'}}>
        {NAV.map(n=>(
          <button key={n.id} onClick={()=>setTab(n.id)} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',padding:'10px 0 8px',background:'none',border:'none',gap:3}}>
            <Ico n={n.i} sz={21} c={tab===n.id?'#10B981':'#64748B'}/>
            <span style={{fontSize:9,color:tab===n.id?'#10B981':'#64748B',fontWeight:tab===n.id?600:400}}>{n.l}</span>
          </button>
        ))}
      </nav>
    </div>
  );
}

// ── Gráficos ─────────────────────────────────────────────────────────
function GraficosTab({entries,mes,ano,sumMes,isWagner}){
  const barRef=useRef(null);
  const pieRef=useRef(null);
  const lineRef=useRef(null);
  const cartoesRef=useRef(null);
  const chartsRef=useRef({});

  // Dados: receita vs despesa últimos 6 meses
  const ultimos6=Array.from({length:6},(_,i)=>{
    const d=new Date(ano,mes-5+i,1);
    return{m:MESES_NOME[d.getMonth()],r:sumMes('income',d.getMonth(),d.getFullYear()),e:sumMes('expense',d.getMonth(),d.getFullYear())};
  });

  // Despesas por categoria mês atual
  const catE=entries.filter(e=>{const d=new Date((e.date||td())+'T12:00:00');return e.kind==='expense'&&d.getMonth()===mes&&d.getFullYear()===ano})
    .reduce((a,e)=>{a[e.category]=(a[e.category]||0)+(e.amount||0);return a},{});
  const catLabels=Object.keys(catE);
  const catValues=Object.values(catE);
  const catColors=['#10B981','#3B82F6','#8B5CF6','#F59E0B','#F43F5E','#06B6D4','#EC4899','#84CC16'];

  // Saldo acumulado ano
  const mesesAno=Array.from({length:mes+1},(_,i)=>{
    const r=sumMes('income',i,ano),e=sumMes('expense',i,ano);
    return{m:MESES_NOME[i],s:r-e};
  });
  let acum=0;
  const acumData=mesesAno.map(m=>{acum+=m.s;return acum});

  // Cartões por mês (só Wagner)
  const cartoesData=isWagner?MESES_PLANO.map((_,i)=>WAGNER_CARTOES.filter(c=>c.meses.includes(i+6)).reduce((s,c)=>s+c.valor,0)):[];

  const chartOpts={responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#94A3B8',font:{size:11}}},tooltip:{callbacks:{label:ctx=>' '+fmt(ctx.raw)}}},scales:{x:{ticks:{color:'#64748B',font:{size:11}},grid:{color:'rgba(255,255,255,0.04)'}},y:{ticks:{color:'#64748B',font:{size:11},callback:v=>fmtK(v)},grid:{color:'rgba(255,255,255,0.06)'}}}};

  useEffect(()=>{
    const destroy=r=>{if(chartsRef.current[r]){chartsRef.current[r].destroy();delete chartsRef.current[r]}};

    // Bar: receita vs despesa
    if(barRef.current){destroy('bar');chartsRef.current.bar=new Chart(barRef.current,{type:'bar',data:{labels:ultimos6.map(m=>m.m),datasets:[{label:'Receita',data:ultimos6.map(m=>m.r),backgroundColor:'rgba(16,185,129,0.7)',borderRadius:6},{label:'Despesa',data:ultimos6.map(m=>m.e),backgroundColor:'rgba(244,63,94,0.7)',borderRadius:6}]},options:{...chartOpts,plugins:{...chartOpts.plugins,title:{display:true,text:'Receita vs Despesa (6 meses)',color:'#F1F5F9',font:{size:13,weight:'600'}}}}});}

    // Pie: categorias
    if(pieRef.current&&catLabels.length>0){destroy('pie');chartsRef.current.pie=new Chart(pieRef.current,{type:'doughnut',data:{labels:catLabels.map(c=>c.charAt(0).toUpperCase()+c.slice(1)),datasets:[{data:catValues,backgroundColor:catColors.slice(0,catLabels.length),borderWidth:0,hoverOffset:8}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{color:'#94A3B8',font:{size:11},padding:12}},title:{display:true,text:'Despesas por categoria',color:'#F1F5F9',font:{size:13,weight:'600'}},tooltip:{callbacks:{label:ctx=>' '+fmt(ctx.raw)+' ('+Math.round(ctx.parsed/catValues.reduce((a,b)=>a+b,0)*100)+'%)'}}}}});}

    // Line: saldo acumulado
    if(lineRef.current){destroy('line');chartsRef.current.line=new Chart(lineRef.current,{type:'line',data:{labels:mesesAno.map(m=>m.m),datasets:[{label:'Saldo acumulado',data:acumData,borderColor:'#3B82F6',backgroundColor:'rgba(59,130,246,0.1)',fill:true,tension:0.4,pointBackgroundColor:'#3B82F6',pointRadius:4}]},options:{...chartOpts,plugins:{...chartOpts.plugins,title:{display:true,text:'Evolução do saldo ('+ano+')',color:'#F1F5F9',font:{size:13,weight:'600'}}}}});}

    // Bar: cartões por mês (Wagner)
    if(cartoesRef.current&&isWagner){destroy('cartoes');chartsRef.current.cartoes=new Chart(cartoesRef.current,{type:'bar',data:{labels:MESES_PLANO,datasets:[{label:'Parcelas',data:cartoesData,backgroundColor:cartoesData.map(v=>v>0?'rgba(245,158,11,0.7)':'rgba(16,185,129,0.3)'),borderRadius:6}]},options:{...chartOpts,plugins:{...chartOpts.plugins,title:{display:true,text:'Cartões por mês (Jul–Dez/26)',color:'#F1F5F9',font:{size:13,weight:'600'}}}}});}

    return()=>{Object.values(chartsRef.current).forEach(c=>c.destroy());chartsRef.current={}};
  },[entries.length,mes,ano]);

  return(
    <div style={{flex:1,overflowY:'auto',padding:'0 16px'}}>
      <div style={{fontSize:18,fontWeight:700,padding:'16px 0 12px'}}>Gráficos</div>

      <div style={{...card,height:240}}>
        <canvas ref={barRef}/>
      </div>

      {catLabels.length>0?<div style={{...card,height:260}}><canvas ref={pieRef}/></div>
      :<div style={{...card,textAlign:'center',padding:'30px',color:'#64748B',fontSize:13}}>
        Adicione despesas para ver o gráfico de categorias 📊
      </div>}

      <div style={{...card,height:220}}>
        <canvas ref={lineRef}/>
      </div>

      {isWagner&&<div style={{...card,height:220}}>
        <canvas ref={cartoesRef}/>
      </div>}

      {isWagner&&<div style={{...card,background:'rgba(245,158,11,0.08)'}}>
        <div style={{fontSize:13,fontWeight:600,marginBottom:10,color:'#F59E0B'}}>🎯 Lazer com a Marcela</div>
        {[{m:'Julho',v:'R$ 0',o:'Mês de execução'},{m:'Agosto',v:'R$ 900',o:'Cartão pesado'},{m:'Set–Nov',v:'R$ 1.200',o:'Saldo maior'},{m:'Dezembro',v:'R$ 1.500+',o:'Zero cartão 🎉'}].map((r,i)=>(
          <div key={i} style={{display:'flex',justifyContent:'space-between',fontSize:13,padding:'6px 0',borderTop:i>0?'0.5px solid rgba(245,158,11,0.15)':'none'}}>
            <span style={{color:'#94A3B8'}}>{r.m} <span style={{fontSize:11,color:'#64748B'}}>· {r.o}</span></span>
            <span style={{fontWeight:600,color:'#F59E0B'}}>{r.v}</span>
          </div>
        ))}
      </div>}
      <div style={{height:20}}/>
    </div>
  );
}

// ── Lançamentos ──────────────────────────────────────────────────────
function EntriesTab({entries,addEntry,delEntry}){
  const [showAdd,setShowAdd]=useState(false);
  const [saving,setSaving]=useState(false);
  const [form,setForm]=useState({kind:'income',desc:'',amount:'',category:'servico',date:td(),forma:'PIX',parcelas:1});
  const sorted=[...entries].sort((a,b)=>new Date(b.date||td())-new Date(a.date||td()));
  const CATS=form.kind==='income'?CAT_INC:CAT_EXP;

  const add=async()=>{
    if(!form.desc||!form.amount||saving)return;
    setSaving(true);
    await addEntry({...form,amount:parseFloat(form.amount)});
    setSaving(false);setShowAdd(false);
    setForm({kind:'income',desc:'',amount:'',category:'servico',date:td(),forma:'PIX',parcelas:1});
  };

  return(
    <div style={{flex:1,overflowY:'auto',padding:'0 16px'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'16px 0 12px'}}>
        <div style={{fontSize:18,fontWeight:700}}>Lançamentos</div>
        <button onClick={()=>setShowAdd(!showAdd)} style={{width:36,height:36,borderRadius:10,background:showAdd?'#334155':'#10B981',border:'none',display:'flex',alignItems:'center',justifyContent:'center'}}><Ico n="plus" sz={16} c="#fff"/></button>
      </div>

      {showAdd&&<div style={{...card,marginBottom:10,animation:'fadeIn 0.2s ease'}}>
        <div style={{fontSize:13,fontWeight:600,marginBottom:12}}>Novo lançamento</div>
        <div style={{display:'flex',gap:6,marginBottom:12}}>
          {[['income','📈 Receita'],['expense','📉 Despesa']].map(([k,l])=>(
            <button key={k} onClick={()=>setForm(f=>({...f,kind:k,category:k==='income'?'servico':'moradia'}))} style={{flex:1,padding:'8px',borderRadius:8,border:'none',background:form.kind===k?(k==='income'?'rgba(16,185,129,0.25)':'rgba(244,63,94,0.25)'):'rgba(255,255,255,0.06)',color:form.kind===k?(k==='income'?'#10B981':'#F43F5E'):'#94A3B8',fontSize:13,fontWeight:600}}>{l}</button>
          ))}
        </div>
        {[{f:'desc',l:'Descrição',t:'text',p:'Ex: Serviço de design'},{f:'amount',l:'Valor (R$)',t:'number',p:'0,00'}].map(f=>(
          <div key={f.f} style={{marginBottom:10}}><div style={{fontSize:11,color:'#64748B',marginBottom:4}}>{f.l}</div><input type={f.t} value={form[f.f]} onChange={e=>setForm(p=>({...p,[f.f]:e.target.value}))} placeholder={f.p} style={iS}/></div>
        ))}
        <div style={{marginBottom:10}}><div style={{fontSize:11,color:'#64748B',marginBottom:4}}>Categoria</div>
          <select value={form.category} onChange={e=>setForm(p=>({...p,category:e.target.value}))} style={iS}>
            {CATS.map(c=><option key={c.v} value={c.v}>{c.l}</option>)}
          </select>
        </div>
        <div style={{marginBottom:10}}><div style={{fontSize:11,color:'#64748B',marginBottom:4}}>Forma de pagamento</div>
          <select value={form.forma} onChange={e=>setForm(p=>({...p,forma:e.target.value}))} style={iS}>
            {FORMAS_PAG.map(f=><option key={f} value={f}>{f}</option>)}
          </select>
        </div>
        {form.forma==='Cartão de crédito'&&<div style={{marginBottom:10}}><div style={{fontSize:11,color:'#64748B',marginBottom:4}}>Parcelas</div>
          <select value={form.parcelas} onChange={e=>setForm(p=>({...p,parcelas:parseInt(e.target.value)}))} style={iS}>
            {Array.from({length:12},(_,i)=>i+1).map(n=><option key={n} value={n}>{n===1?'À vista':n+'x de '+fmt((parseFloat(form.amount)||0)/n)}</option>)}
          </select>
        </div>}
        <div style={{marginBottom:12}}><div style={{fontSize:11,color:'#64748B',marginBottom:4}}>Data</div><input type="date" value={form.date} onChange={e=>setForm(p=>({...p,date:e.target.value}))} style={iS}/></div>
        <button onClick={add} disabled={saving} style={{width:'100%',padding:'12px',background:saving?'#334155':'#10B981',border:'none',borderRadius:10,color:'#fff',fontSize:15,fontWeight:600,cursor:saving?'default':'pointer'}}>{saving?'Salvando...':'Salvar lançamento'}</button>
      </div>}

      {sorted.length===0?<div style={{textAlign:'center',padding:'60px 20px',color:'#64748B'}}>
        <div style={{fontSize:40,marginBottom:12}}>📋</div>
        <div style={{fontSize:15}}>Nenhum lançamento ainda</div>
        <div style={{fontSize:13,marginTop:6}}>Toque em + para adicionar</div>
      </div>:sorted.map(e=>(
        <div key={e.id} style={{display:'flex',alignItems:'center',gap:12,padding:'12px 0',borderBottom:'0.5px solid rgba(255,255,255,0.06)',animation:'fadeIn 0.15s ease'}}>
          <div style={{width:38,height:38,borderRadius:10,background:e.kind==='income'?'rgba(16,185,129,0.15)':'rgba(244,63,94,0.15)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,flexShrink:0}}>{e.kind==='income'?'📈':'📉'}</div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:14,fontWeight:500,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{e.desc}</div>
            <div style={{fontSize:11,color:'#64748B',marginTop:2}}>
              {[e.category,e.forma,e.parcelas>1?e.parcelas+'x':null,new Date((e.date||td())+'T12:00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'short'})].filter(Boolean).join(' · ')}
            </div>
          </div>
          <div style={{fontSize:15,fontWeight:700,color:e.kind==='income'?'#10B981':'#F43F5E',whiteSpace:'nowrap'}}>{e.kind==='income'?'+':'-'}{fmtK(e.amount||0)}</div>
          <button onClick={()=>delEntry(e.id)} style={{background:'none',border:'none',padding:6,borderRadius:6,display:'flex'}}><Ico n="trash" sz={16} c="#64748B"/></button>
        </div>
      ))}
      <div style={{height:20}}/>
    </div>
  );
}

// ── Plano ────────────────────────────────────────────────────────────
function PlanTab({checklist,saveCk,feitos,ckP,isWagner}){
  const toggle=i=>{const n=[...checklist];n[i].feito=!n[i].feito;saveCk(n)};
  return(
    <div style={{flex:1,overflowY:'auto',padding:'0 16px'}}>
      <div style={{fontSize:18,fontWeight:700,padding:'16px 0 12px'}}>Plano Jul–Dez/26</div>
      {isWagner&&checklist.length>0&&<>
        <div style={card}>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:10}}><div style={{fontSize:13,fontWeight:600}}>✅ Checklist de julho</div><div style={{fontSize:13,color:'#10B981',fontWeight:600}}>{feitos}/{checklist.length}</div></div>
          <div style={{background:'rgba(255,255,255,0.08)',borderRadius:4,height:6,marginBottom:14,overflow:'hidden'}}><div style={{height:6,borderRadius:4,width:ckP+'%',background:ckP===100?'#10B981':'#3B82F6',transition:'width 0.4s'}}/></div>
          {checklist.map((c,i)=>(
            <div key={i} onClick={()=>toggle(i)} style={{display:'flex',gap:12,padding:'10px 0',borderTop:i>0?'0.5px solid rgba(255,255,255,0.06)':'none',cursor:'pointer',alignItems:'flex-start'}}>
              <div style={{width:22,height:22,borderRadius:'50%',border:c.feito?'none':'1.5px solid #334155',background:c.feito?'#10B981':'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,marginTop:1}}>
                {c.feito&&<Ico n="check" sz={12} c="#fff"/>}
              </div>
              <div><div style={{fontSize:13,fontWeight:500,color:c.feito?'#64748B':'#F1F5F9',textDecoration:c.feito?'line-through':'none'}}>{c.a}</div><div style={{fontSize:11,color:c.feito?'#10B981':'#64748B',marginTop:2}}>{c.i}</div></div>
            </div>
          ))}
          {ckP===100&&<div style={{marginTop:12,background:'rgba(16,185,129,0.15)',borderRadius:8,padding:'10px',textAlign:'center',fontSize:14,fontWeight:600,color:'#10B981'}}>🎉 Julho executado! Você mudou sua vida financeira.</div>}
        </div>
        <div style={card}>
          <div style={{fontSize:13,fontWeight:600,marginBottom:14}}>Saldo livre por mês</div>
          {MESES_PLANO.map((m,i)=>{const max=Math.max(...SALDOS_PLANO),pct=(SALDOS_PLANO[i]/max)*100;return(
            <div key={i} style={{marginBottom:12}}>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:13,marginBottom:4}}>
                <span style={{color:'#94A3B8',display:'flex',gap:6,alignItems:'center'}}>{m}{i===5&&<span style={{fontSize:10,background:'rgba(139,92,246,0.2)',color:'#8B5CF6',padding:'1px 6px',borderRadius:20}}>👶</span>}{i===5&&<span style={{fontSize:10,background:'rgba(16,185,129,0.2)',color:'#10B981',padding:'1px 6px',borderRadius:20}}>zero cartão</span>}</span>
                <span style={{fontWeight:600,color:SALDOS_PLANO[i]>4000?'#10B981':'#F59E0B'}}>{fmt(SALDOS_PLANO[i])}</span>
              </div>
              <div style={{background:'rgba(255,255,255,0.08)',borderRadius:4,height:6}}><div style={{height:6,borderRadius:4,width:pct.toFixed(1)+'%',background:i===0?'#3B82F6':'#10B981'}}/></div>
            </div>
          )})}
        </div>
        <div style={card}>
          <div style={{fontSize:13,fontWeight:600,marginBottom:12}}>Dívidas em dez/26</div>
          {[{l:'Moto (R$ 44k)',s:'✅ Eliminada em julho',c:'#10B981'},{l:'MEI (R$ 4k)',s:'✅ Quitado em julho',c:'#10B981'},{l:'Cartão Militão',s:'⏳ Encerra out/26',c:'#F59E0B'},{l:'Cartão Roger',s:'⏳ Encerra nov/26',c:'#F59E0B'},{l:'Cartão Ebó',s:'⏳ Encerra out/26',c:'#F59E0B'}].map((d,i)=>(
            <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',fontSize:13,padding:'7px 0',borderTop:i>0?'0.5px solid rgba(255,255,255,0.06)':'none'}}>
              <span style={{color:'#94A3B8'}}>{d.l}</span><span style={{color:d.c,fontWeight:500,fontSize:12}}>{d.s}</span>
            </div>
          ))}
          <div style={{marginTop:12,background:'rgba(16,185,129,0.12)',borderRadius:8,padding:'10px',textAlign:'center',fontSize:13,fontWeight:600,color:'#10B981'}}>Dezembro: zero dívidas + R$ 22k em reservas 🎉</div>
        </div>
      </>}
      {!isWagner&&<div style={{...card,textAlign:'center',padding:'40px 20px',color:'#64748B'}}>
        <div style={{fontSize:36,marginBottom:12}}>📋</div>
        <div style={{fontSize:14}}>Use Lançamentos para registrar suas receitas e despesas. Os gráficos e painel atualizam automaticamente.</div>
      </div>}
      <div style={{height:20}}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
