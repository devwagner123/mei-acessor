// ── Chart Hook ───────────────────────────────────────────────────────
function useChart(ref, type, data, options){
  useEffect(()=>{
    if(!ref.current)return;
    const ctx=ref.current.getContext('2d');
    const chart=new Chart(ctx,{type,data,options});
    return()=>chart.destroy();
  },[JSON.stringify(data)]);
}

// ── Login ────────────────────────────────────────────────────────────

  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState('');
  const login=async()=>{
    setLoading(true);setErr('');
    try{await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider())}

// ── App ──────────────────────────────────────────────────────────────
function App(){
  const [user,setUser]=useState(undefined);
  const [tab,setTab]=useState('dash');
  const [entries,setEntries]=useState([]);
  const [checklist,setChecklist]=useState([]);
  const [fixas,setFixas]=useState([]);
  const [contas,setContas]=useState(['Banco do Brasil','PicPay']);
  const [loadingData,setLoadingData]=useState(true);
  const [isWagner,setIsWagner]=useState(false);

  useEffect(()=>auth.onAuthStateChanged(u=>{
    setUser(u??null);
    if(u){
      if(!localStorage.getItem('mei_owner'))localStorage.setItem('mei_owner',u.uid);
      setIsWagner(u.uid===localStorage.getItem('mei_owner'));
    }
  }),[]);

  useEffect(()=>{
    if(!user)return;
    setLoadingData(true);
    const uid=user.uid;
    const owner=uid===localStorage.getItem('mei_owner');
    setIsWagner(owner);
    const unsub=db.collection('users').doc(uid).collection('entries')
      .orderBy('createdAt','desc').onSnapshot(snap=>{
        setEntries(snap.docs.map(d=>({id:d.id,...d.data()})));
        setLoadingData(false);
      },()=>setLoadingData(false));
    db.collection('users').doc(uid).collection('meta').doc('checklist').get().then(doc=>{
      if(doc.exists)setChecklist(doc.data().items||[]);
      else if(owner){setChecklist(WAGNER_CK);db.collection('users').doc(uid).collection('meta').doc('checklist').set({items:WAGNER_CK});}
      else setChecklist([]);
    });
    db.collection('users').doc(uid).collection('meta').doc('fixas').get().then(doc=>{
      if(doc.exists)setFixas(doc.data().items||[]);
      else if(owner){setFixas(WAGNER_FIXAS);db.collection('users').doc(uid).collection('meta').doc('fixas').set({items:WAGNER_FIXAS});}
      else setFixas([]);
    });
    db.collection('users').doc(uid).collection('meta').doc('contas').get().then(doc=>{
      if(doc.exists)setContas(doc.data().items||['Banco do Brasil','PicPay']);
      else{const def=['Banco do Brasil','PicPay'];setContas(def);db.collection('users').doc(uid).collection('meta').doc('contas').set({items:def});}
    });
    return()=>unsub();
  },[user]);

  const addEntry=async e=>{
    if(!user)return;
    try{
      await db.collection('users').doc(user.uid).collection('entries').add({...e,createdAt:firebase.firestore.FieldValue.serverTimestamp()});
    }catch(err){
      console.error('Erro ao adicionar lançamento:',err);
      alert('Erro ao salvar: '+(err.message||'tente novamente'));
      throw err;
    }
  };
  const delEntry=async id=>{if(!user)return;await db.collection('users').doc(user.uid).collection('entries').doc(id).delete()};
  const updateEntry=async(id,data)=>{
    if(!user)return;
    try{
      await db.collection('users').doc(user.uid).collection('entries').doc(id).update(data);
    }catch(err){
      console.error('Erro ao atualizar lançamento:',err);
      alert('Erro ao salvar: '+(err.message||'tente novamente'));
      throw err;
    }
  };
  const saveCk=async ck=>{setChecklist(ck);if(user)await db.collection('users').doc(user.uid).collection('meta').doc('checklist').set({items:ck})};
  const saveFixas=async fx=>{setFixas(fx);if(user)await db.collection('users').doc(user.uid).collection('meta').doc('fixas').set({items:fx})};
  const saveContas=async ct=>{setContas(ct);if(user)await db.collection('users').doc(user.uid).collection('meta').doc('contas').set({items:ct})};

  if(user===undefined)return <Loader/>;
  if(user===null)return <LoginScreen/>;
  if(loadingData)return <Loader/>;

  const now=new Date(),mes=now.getMonth(),ano=now.getFullYear();
  const filterMes=(k,m,a)=>entries.filter(e=>{const d=new Date((e.date||td())+'T12:00:00');return e.kind===k&&d.getMonth()===m&&d.getFullYear()===a});
  const sumMes=(k,m,a)=>filterMes(k,m,a).reduce((s,e)=>s+(e.amount||0),0);
  const rM=sumMes('income',mes,ano),eM=sumMes('expense',mes,ano),sM=rM-eM;
  const rA=entries.filter(e=>e.kind==='income'&&new Date((e.date||td())+'T12:00:00').getFullYear()===ano).reduce((s,e)=>s+(e.amount||0),0);
  const lP=Math.min(100,(rA/LIMITE_MEI)*100);
  const feitos=checklist.filter(c=>c.feito).length;
  const ckP=checklist.length>0?Math.round((feitos/checklist.length)*100):0;
  const fixasMes=fixas.reduce((s,f)=>s+f.valor,0);
  const cartoesMes=isWagner?WAGNER_CARTOES.filter(c=>c.meses.includes(mes)).reduce((s,c)=>s+c.valor,0):0;

  return(
    <div style={{display:'flex',flexDirection:'column',height:'100dvh',background:'#0F172A',overflow:'hidden'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'12px 16px',paddingTop:'calc(12px + env(safe-area-inset-top,0px))',background:'#1E293B',borderBottom:'0.5px solid rgba(255,255,255,0.06)'}}>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <div style={{width:30,height:30,borderRadius:8,background:'linear-gradient(135deg,#3B82F6,#10B981)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16}}>💰</div>
          <div><div style={{fontSize:14,fontWeight:600}}>MEI Assessor</div><div style={{fontSize:11,color:'#64748B'}}>{user.displayName?.split(' ')[0]||'Usuário'}</div></div>
        </div>
        <button onClick={()=>auth.signOut()} style={{background:'none',border:'none',padding:6,borderRadius:8,display:'flex',color:'#64748B'}}>
          <Ico n="logout" sz={18} c="#64748B"/>
        </button>
      </div>
      <div style={{flex:1,overflow:'hidden',display:'flex',flexDirection:'column'}}>
        {tab==='dash'&&<DashTab rM={rM} eM={eM} sM={sM} rA={rA} lP={lP} isWagner={isWagner} fixasMes={fixasMes} cartoesMes={cartoesMes} entries={entries} mes={mes} ano={ano} contas={contas}/>}
        {tab==='mesreal'&&<MesRealTab isWagner={isWagner} entries={entries} fixas={fixas} contas={contas} mes={mes} ano={ano}/>}
        {tab==='fixas'&&<FixasTab fixas={fixas} saveFixas={saveFixas} isWagner={isWagner} contas={contas} saveContas={saveContas}/>}
        {tab==='graficos'&&<GraficosTab entries={entries} mes={mes} ano={ano} sumMes={sumMes} isWagner={isWagner}/>}
        {tab==='entries'&&<EntriesTab entries={entries} addEntry={addEntry} delEntry={delEntry} updateEntry={updateEntry} contas={contas}/>}
        {tab==='plan'&&<PlanTab checklist={checklist} saveCk={saveCk} feitos={feitos} ckP={ckP} isWagner={isWagner}/>}
      </div>
      <nav style={{display:'flex',background:'#1E293B',borderTop:'0.5px solid rgba(255,255,255,0.08)',paddingBottom:'env(safe-area-inset-bottom,0px)'}}>
        {NAV.map(n=>(
          <button key={n.id} onClick={()=>setTab(n.id)} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',padding:'10px 0 8px',background:'none',border:'none',gap:3}}>
            <Ico n={n.i} sz={21} c={tab===n.id?'#10B981':'#64748B'}/>
            <span style={{fontSize:9,color:tab===n.id?'#10B981':'#64748B',fontWeight:tab===n.id?600:400}}>{n.l}</span>
          </button>
        ))}
      </nav>
    </div>
  );
}

// ── Julho Real ───────────────────────────────────────────────────────
function MesRealTab({isWagner,entries,fixas,contas,mes:mesAtual,ano:anoAtual}){
  const [viewMes,setViewMes]=useState(mesAtual);
  const [viewAno,setViewAno]=useState(anoAtual);
  const mes=viewMes,ano=viewAno;

  const [pagos,setPagos]=useState(()=>{
    try{return JSON.parse(localStorage.getItem('mes_real_pagos_'+ano+'_'+mes))||{}}catch{return{}}
  });

  useEffect(()=>{
    try{setPagos(JSON.parse(localStorage.getItem('mes_real_pagos_'+ano+'_'+mes))||{})}catch{setPagos({})}
  },[mes,ano]);

  const toggle=(id)=>{
    const n={...pagos,[id]:!pagos[id]};
    setPagos(n);
    localStorage.setItem('mes_real_pagos_'+ano+'_'+mes,JSON.stringify(n));
  };

  const irMesAnterior=()=>{
    if(mes===0){setViewMes(11);setViewAno(ano-1)}else{setViewMes(mes-1)}
  };
  const irProximoMes=()=>{
    if(mes===11){setViewMes(0);setViewAno(ano+1)}else{setViewMes(mes+1)}
  };
  const voltarHoje=()=>{setViewMes(mesAtual);setViewAno(anoAtual)}
  const isMesAtual=mes===mesAtual&&ano===anoAtual;

  const nomeMes=new Date(ano,mes,1).toLocaleDateString('pt-BR',{month:'long',year:'numeric'}).replace(/^\w/,c=>c.toUpperCase());

  const MesNav=(
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'16px 0 12px',gap:8}}>
      <button onClick={irMesAnterior} style={{width:36,height:36,borderRadius:10,background:'rgba(255,255,255,0.06)',border:'none',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#94A3B8" strokeWidth={2} strokeLinecap="round" strokeLinejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <div style={{flex:1,textAlign:'center'}}>
        <div style={{fontSize:18,fontWeight:700}}>{nomeMes}</div>
        {!isMesAtual&&<button onClick={voltarHoje} style={{background:'none',border:'none',color:'#3B82F6',fontSize:11,fontWeight:600,marginTop:2}}>Voltar para hoje</button>}
      </div>
      <button onClick={irProximoMes} style={{width:36,height:36,borderRadius:10,background:'rgba(255,255,255,0.06)',border:'none',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#94A3B8" strokeWidth={2} strokeLinecap="round" strokeLinejoin="round"><path d="M9 18l6-6-6-6"/></svg>
      </button>
    </div>
  );

  if(!isWagner&&fixas.length===0){
    return(
      <div style={{flex:1,overflowY:'auto',padding:'0 16px'}}>
        {MesNav}
        <div style={{...card,textAlign:'center',padding:'40px 20px',color:'#64748B'}}>
          <div style={{fontSize:36,marginBottom:12}}>📋</div>
          <div style={{fontSize:14}}>Cadastre suas despesas fixas na aba "Fixas" para ver o resumo do mês aqui.</div>
        </div>
        <div style={{height:20}}/>
      </div>
    );
  }

  // Lançamentos reais já feitos no mês atual (excluindo saldo inicial)
  const inMes=e=>{const d=new Date((e.date||td())+'T12:00:00');return d.getMonth()===mes&&d.getFullYear()===ano};
  const recebidos=entries.filter(e=>e.kind==='income'&&inMes(e));
  const gastos=entries.filter(e=>e.kind==='expense'&&inMes(e));
  const totalRecebido=recebidos.reduce((s,e)=>s+(e.amount||0),0);
  const totalGasto=gastos.reduce((s,e)=>s+(e.amount||0),0);

  // Despesas fixas cadastradas (aba Fixas) — ainda não lançadas como "expense" neste mês
  const totalFixas=fixas.reduce((s,f)=>s+f.valor,0);
  const marcadosFixas=fixas.filter((f,i)=>pagos['fixa-'+i]).reduce((s,f)=>s+f.valor,0);

  // Saldo em caixa agora = tudo que já foi lançado como receita/despesa real
  const caixaAtual=totalRecebido-totalGasto;

  // Projeção: caixa atual - o que falta pagar das fixas
  const faltaPagarFixas=totalFixas-marcadosFixas;
  const saldoProjetado=caixaAtual-faltaPagarFixas;

  return(
    <div style={{flex:1,overflowY:'auto',padding:'0 16px'}}>
      {MesNav}

      <div style={{...card,background:'rgba(59,130,246,0.1)'}}>
        <div style={{fontSize:13,fontWeight:600,marginBottom:10}}>💵 Caixa real agora</div>
        <div style={{display:'flex',justifyContent:'space-between',fontSize:14,padding:'5px 0'}}>
          <span style={{color:'#94A3B8'}}>Recebido no mês (lançado)</span>
          <span style={{color:'#10B981',fontWeight:600}}>{fmt(totalRecebido)}</span>
        </div>
        <div style={{display:'flex',justifyContent:'space-between',fontSize:14,padding:'5px 0',borderTop:'0.5px solid rgba(255,255,255,0.06)'}}>
          <span style={{color:'#94A3B8'}}>(−) Já gasto (lançado)</span>
          <span style={{color:'#F43F5E',fontWeight:600}}>{fmt(totalGasto)}</span>
        </div>
        <div style={{display:'flex',justifyContent:'space-between',fontSize:16,fontWeight:700,padding:'8px 0 0',borderTop:'1px solid rgba(255,255,255,0.15)',marginTop:4}}>
          <span>Saldo do mês (lançado)</span>
          <span style={{color:'#3B82F6'}}>{fmt(caixaAtual)}</span>
        </div>
      </div>

      {recebidos.length>0&&<div style={card}>
        <div style={{fontSize:13,fontWeight:600,marginBottom:10}}>✅ Receitas lançadas no mês</div>
        {recebidos.map((item,i)=>(
          <div key={item.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',fontSize:13,padding:'8px 0',borderTop:i>0?'0.5px solid rgba(255,255,255,0.06)':'none'}}>
            <div>
              <div style={{color:'#F1F5F9'}}>{item.desc}</div>
              <div style={{fontSize:11,color:'#64748B'}}>{item.conta||'—'}</div>
            </div>
            <span style={{color:'#10B981',fontWeight:600}}>{fmt(item.amount)}</span>
          </div>
        ))}
      </div>}

      {gastos.length>0&&<div style={card}>
        <div style={{fontSize:13,fontWeight:600,marginBottom:10}}>💸 Despesas lançadas no mês</div>
        {gastos.map((item,i)=>(
          <div key={item.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',fontSize:13,padding:'8px 0',borderTop:i>0?'0.5px solid rgba(255,255,255,0.06)':'none'}}>
            <div>
              <div style={{color:'#F1F5F9'}}>{item.desc}</div>
              <div style={{fontSize:11,color:'#64748B'}}>{item.conta||'—'}</div>
            </div>
            <span style={{color:'#F43F5E',fontWeight:600}}>{fmt(item.amount)}</span>
          </div>
        ))}
      </div>}

      {fixas.length>0&&<div style={card}>
        <div style={{fontSize:13,fontWeight:600,marginBottom:10}}>⏳ Despesas fixas — marcar como pagas</div>
        <div style={{fontSize:11,color:'#64748B',marginBottom:10}}>Vêm da aba "Fixas". Marque conforme for pagando neste mês.</div>
        {fixas.map((f,i)=>{
          const id='fixa-'+i;
          const done=!!pagos[id];
          return(
            <div key={id} onClick={()=>toggle(id)} style={{display:'flex',alignItems:'center',gap:10,padding:'9px 0',borderTop:i>0?'0.5px solid rgba(255,255,255,0.06)':'none',cursor:'pointer'}}>
              <div style={{width:20,height:20,borderRadius:6,border:done?'none':'1.5px solid #334155',background:done?'#10B981':'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                {done&&<Ico n="check" sz={12} c="#fff"/>}
              </div>
              <div style={{flex:1}}>
                <div style={{fontSize:13,color:done?'#64748B':'#F1F5F9',textDecoration:done?'line-through':'none'}}>{f.nome}</div>
                <div style={{fontSize:11,color:'#64748B'}}>{f.cat}</div>
              </div>
              <span style={{fontSize:13,fontWeight:600,color:done?'#64748B':'#F43F5E'}}>{fmt(f.valor)}</span>
            </div>
          );
        })}
        <div style={{marginTop:10,paddingTop:10,borderTop:'1px solid rgba(255,255,255,0.1)',display:'flex',justifyContent:'space-between',fontSize:14,fontWeight:700}}>
          <span>Total fixas do mês</span><span style={{color:'#F43F5E'}}>{fmt(totalFixas)}</span>
        </div>
        <div style={{display:'flex',justifyContent:'space-between',fontSize:13,marginTop:4}}>
          <span style={{color:'#64748B'}}>Ainda falta pagar</span><span style={{color:'#F59E0B',fontWeight:600}}>{fmt(faltaPagarFixas)}</span>
        </div>
      </div>}

      <div style={{...card,background:'rgba(139,92,246,0.1)'}}>
        <div style={{fontSize:13,fontWeight:600,marginBottom:10}}>📊 Projeção — saldo do mês</div>
        <div style={{fontSize:11,color:'#64748B',marginBottom:8}}>Saldo lançado menos as fixas que ainda faltam pagar</div>
        <div style={{fontSize:26,fontWeight:700,color:saldoProjetado>=0?'#8B5CF6':'#F43F5E'}}>{fmt(saldoProjetado)}</div>
      </div>

      <div style={{height:20}}/>
    </div>
  );
}

// ── Fixas (editável) ────────────────────────────────────────────────
function FixasTab({fixas,saveFixas,isWagner,contas,saveContas}){
  const [showAdd,setShowAdd]=useState(false);
  const [editIdx,setEditIdx]=useState(null);
  const [form,setForm]=useState({nome:'',valor:'',cat:'Moradia'});
  const [showContaAdd,setShowContaAdd]=useState(false);
  const contasDisponiveis=CONTAS_PADRAO.filter(c=>!contas.includes(c));
  const [novaConta,setNovaConta]=useState(contasDisponiveis[0]||'');

  const CATS_FIXAS=['Moradia','Família','Saúde','Telecom','Alimentação','Transporte','Outros'];

  const openNew=()=>{setEditIdx(null);setForm({nome:'',valor:'',cat:'Moradia'});setShowAdd(true)};
  const openEdit=(f,i)=>{setEditIdx(i);setForm({nome:f.nome,valor:String(f.valor),cat:f.cat||'Outros'});setShowAdd(true)};
  const closeForm=()=>{setShowAdd(false);setEditIdx(null);setForm({nome:'',valor:'',cat:'Moradia'})};

  const save=()=>{
    if(!form.nome||!form.valor)return;
    const item={nome:form.nome,valor:parseFloat(form.valor),cat:form.cat};
    let next=[...fixas];
    if(editIdx!==null){next[editIdx]=item}
    else{next.push(item)}
    saveFixas(next);
    closeForm();
  };

  const remove=(i)=>{
    const next=fixas.filter((_,idx)=>idx!==i);
    saveFixas(next);
  };

  const openContaAdd=()=>{
    setNovaConta(contasDisponiveis[0]||'');
    setShowContaAdd(!showContaAdd);
  };

  const addConta=()=>{
    if(!novaConta||contas.includes(novaConta))return;
    saveContas([...contas,novaConta]);
    setShowContaAdd(false);
  };

  const removeConta=(c)=>{
    saveContas(contas.filter(x=>x!==c));
  };

  const ContasCard=(
    <div style={card}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
        <div style={{fontSize:13,fontWeight:600}}>🏦 Minhas contas bancárias</div>
        <button onClick={openContaAdd} style={{background:'none',border:'none',color:'#10B981',fontSize:12,fontWeight:600}}>{showContaAdd?'Cancelar':'+ Adicionar'}</button>
      </div>
      {showContaAdd&&(contasDisponiveis.length>0?<div style={{display:'flex',gap:6,marginBottom:10}}>
        <select value={novaConta} onChange={e=>setNovaConta(e.target.value)} style={{...iS,flex:1}}>
          {contasDisponiveis.map(c=><option key={c} value={c}>{c}</option>)}
        </select>
        <button onClick={addConta} style={{padding:'0 16px',background:'#10B981',border:'none',borderRadius:8,color:'#fff',fontSize:13,fontWeight:600}}>OK</button>
      </div>:<div style={{fontSize:12,color:'#64748B',marginBottom:10}}>Todos os bancos disponíveis já foram adicionados.</div>)}
      <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
        {contas.map(c=>(
          <div key={c} style={{display:'flex',alignItems:'center',gap:6,background:'rgba(59,130,246,0.15)',borderRadius:20,padding:'5px 6px 5px 12px',fontSize:12,color:'#3B82F6',fontWeight:600}}>
            {c}
            <button onClick={()=>removeConta(c)} style={{background:'rgba(255,255,255,0.1)',border:'none',borderRadius:'50%',width:16,height:16,display:'flex',alignItems:'center',justifyContent:'center',color:'#3B82F6',fontSize:10,cursor:'pointer',padding:0}}>✕</button>
          </div>
        ))}
      </div>
      <div style={{fontSize:11,color:'#64748B',marginTop:8}}>Usadas para identificar entrada/saída de cada lançamento.</div>
    </div>
  );

  if(!isWagner){
    return(
      <div style={{flex:1,overflowY:'auto',padding:'0 16px'}}>
        <div style={{fontSize:18,fontWeight:700,padding:'16px 0 12px'}}>Despesas Fixas</div>
        {ContasCard}
        <div style={{...card,textAlign:'center',padding:'40px 20px',color:'#64748B'}}>
          <div style={{fontSize:36,marginBottom:12}}>📋</div>
          <div style={{fontSize:14}}>Suas despesas fixas ainda não foram cadastradas. Use o botão + para começar.</div>
        </div>
        <button onClick={openNew} style={{width:'100%',padding:'12px',background:'#10B981',border:'none',borderRadius:10,color:'#fff',fontSize:15,fontWeight:600,marginTop:10}}>+ Adicionar despesa fixa</button>
        {showAdd&&<FixaForm form={form} setForm={setForm} CATS_FIXAS={CATS_FIXAS} save={save} closeForm={closeForm} editIdx={editIdx}/>}
        <div style={{height:20}}/>
      </div>
    );
  }

  const total=fixas.reduce((s,f)=>s+f.valor,0);
  const porCategoria=fixas.reduce((acc,f)=>{const c=f.cat||'Outros';acc[c]=(acc[c]||0)+f.valor;return acc},{});

  return(
    <div style={{flex:1,overflowY:'auto',padding:'0 16px'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'16px 0 12px'}}>
        <div style={{fontSize:18,fontWeight:700}}>Despesas Fixas</div>
        <button onClick={()=>showAdd?closeForm():openNew()} style={{width:36,height:36,borderRadius:10,background:showAdd?'#334155':'#10B981',border:'none',display:'flex',alignItems:'center',justifyContent:'center'}}><Ico n="plus" sz={16} c="#fff"/></button>
      </div>

      {ContasCard}

      {showAdd&&<FixaForm form={form} setForm={setForm} CATS_FIXAS={CATS_FIXAS} save={save} closeForm={closeForm} editIdx={editIdx}/>}

      <div style={{...card,background:'rgba(244,63,94,0.08)',marginBottom:10}}>
        <div style={{fontSize:11,color:'#94A3B8',marginBottom:4}}>Total de despesas fixas mensais</div>
        <div style={{fontSize:26,fontWeight:700,color:'#F43F5E'}}>{fmt(total)}</div>
      </div>

      {Object.keys(porCategoria).length>0&&<div style={{...card,marginBottom:10}}>
        <div style={{fontSize:13,fontWeight:600,marginBottom:10}}>Por categoria</div>
        {Object.entries(porCategoria).sort((a,b)=>b[1]-a[1]).map(([cat,val])=>{
          const pct=total>0?(val/total)*100:0;
          return(
            <div key={cat} style={{marginBottom:8}}>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:13,marginBottom:3}}>
                <span style={{color:'#94A3B8'}}>{cat}</span>
                <span style={{fontWeight:600}}>{fmt(val)}</span>
              </div>
              <div style={{background:'rgba(255,255,255,0.08)',borderRadius:3,height:5}}><div style={{height:5,borderRadius:3,width:pct.toFixed(1)+'%',background:'#8B5CF6'}}/></div>
            </div>
          );
        })}
      </div>}

      <div style={card}>
        <div style={{fontSize:13,fontWeight:600,marginBottom:10}}>Itens ({fixas.length})</div>
        {fixas.length===0?(
          <div style={{textAlign:'center',padding:'30px 10px',color:'#64748B',fontSize:13}}>Nenhuma despesa fixa cadastrada</div>
        ):fixas.map((f,i)=>(
          <div key={i} onClick={()=>openEdit(f,i)} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 0',borderTop:i>0?'0.5px solid rgba(255,255,255,0.06)':'none',cursor:'pointer'}}>
            <div style={{flex:1}}>
              <div style={{fontSize:14,color:'#F1F5F9'}}>{f.nome}</div>
              <div style={{fontSize:11,color:'#64748B'}}>{f.cat||'Outros'}</div>
            </div>
            <span style={{fontSize:14,fontWeight:600,color:'#F43F5E'}}>{fmt(f.valor)}</span>
            <button onClick={(ev)=>{ev.stopPropagation();remove(i)}} style={{background:'none',border:'none',padding:6,borderRadius:6,display:'flex'}}><Ico n="trash" sz={15} c="#64748B"/></button>
          </div>
        ))}
      </div>
      <div style={{height:20}}/>
    </div>
  );
}

function FixaForm({form,setForm,CATS_FIXAS,save,closeForm,editIdx}){
  return(
    <div style={{...card,marginBottom:10,animation:'fadeIn 0.2s ease'}}>
      <div style={{fontSize:13,fontWeight:600,marginBottom:12}}>{editIdx!==null?'Editar despesa fixa':'Nova despesa fixa'}</div>
      <div style={{marginBottom:10}}>
        <div style={{fontSize:11,color:'#64748B',marginBottom:4}}>Nome</div>
        <input value={form.nome} onChange={e=>setForm(p=>({...p,nome:e.target.value}))} placeholder="Ex: Aluguel" style={iS}/>
      </div>
      <div style={{marginBottom:10}}>
        <div style={{fontSize:11,color:'#64748B',marginBottom:4}}>Valor mensal (R$)</div>
        <input type="number" value={form.valor} onChange={e=>setForm(p=>({...p,valor:e.target.value}))} placeholder="0,00" style={iS}/>
      </div>
      <div style={{marginBottom:12}}>
        <div style={{fontSize:11,color:'#64748B',marginBottom:4}}>Categoria</div>
        <select value={form.cat} onChange={e=>setForm(p=>({...p,cat:e.target.value}))} style={iS}>
          {CATS_FIXAS.map(c=><option key={c} value={c}>{c}</option>)}
        </select>
      </div>
      <div style={{display:'flex',gap:8}}>
        <button onClick={closeForm} style={{flex:1,padding:'12px',background:'rgba(255,255,255,0.06)',border:'none',borderRadius:10,color:'#94A3B8',fontSize:15,fontWeight:600}}>Cancelar</button>
        <button onClick={save} style={{flex:2,padding:'12px',background:'#10B981',border:'none',borderRadius:10,color:'#fff',fontSize:15,fontWeight:600}}>{editIdx!==null?'Salvar alterações':'Adicionar'}</button>
      </div>
    </div>
  );
}

// ── Painel ───────────────────────────────────────────────────────────
function DashTab({rM,eM,sM,rA,lP,isWagner,fixasMes,cartoesMes,entries,mes,ano,contas}){
  const das=1518*0.05+5;

  const porConta=contas.map(c=>{
    const inMes=e=>{const d=new Date((e.date||td())+'T12:00:00');return d.getMonth()===mes&&d.getFullYear()===ano};
    const saldoInicial=entries.find(e=>e.kind==='balance'&&e.conta===c);
    const inicial=saldoInicial?saldoInicial.amount:0;
    const rec=entries.filter(e=>e.kind==='income'&&e.conta===c&&inMes(e)).reduce((s,e)=>s+(e.amount||0),0);
    const desp=entries.filter(e=>e.kind==='expense'&&e.conta===c&&inMes(e)).reduce((s,e)=>s+(e.amount||0),0);
    const transfIn=entries.filter(e=>e.kind==='transfer'&&e.contaDestino===c&&inMes(e)).reduce((s,e)=>s+(e.amount||0),0);
    const transfOut=entries.filter(e=>e.kind==='transfer'&&e.contaOrigem===c&&inMes(e)).reduce((s,e)=>s+(e.amount||0),0);
    // Saldo total da conta = inicial + todas movimentações históricas (não só do mês)
    const recTotal=entries.filter(e=>e.kind==='income'&&e.conta===c).reduce((s,e)=>s+(e.amount||0),0);
    const despTotal=entries.filter(e=>e.kind==='expense'&&e.conta===c).reduce((s,e)=>s+(e.amount||0),0);
    const transfInTotal=entries.filter(e=>e.kind==='transfer'&&e.contaDestino===c).reduce((s,e)=>s+(e.amount||0),0);
    const transfOutTotal=entries.filter(e=>e.kind==='transfer'&&e.contaOrigem===c).reduce((s,e)=>s+(e.amount||0),0);
    const saldoAtual=inicial+recTotal-despTotal+transfInTotal-transfOutTotal;
    return{conta:c,rec,desp,transfIn,transfOut,inicial,saldoAtual,saldoMes:rec-desp+transfIn-transfOut};
  }).filter(c=>c.rec>0||c.desp>0||c.transfIn>0||c.transfOut>0||c.inicial!==0);

  return(
    <div style={{flex:1,overflowY:'auto',padding:'0 16px'}}>
      <div style={{fontSize:18,fontWeight:700,padding:'16px 0 12px'}}>
        {new Date().toLocaleDateString('pt-BR',{month:'long',year:'numeric'}).replace(/^\w/,c=>c.toUpperCase())}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:10}}>
        {[{l:'Receita do mês',v:rM,c:'#10B981',bg:'rgba(16,185,129,0.1)'},{l:'Despesas lançadas',v:eM,c:'#F43F5E',bg:'rgba(244,63,94,0.1)'}].map(c=>(
          <div key={c.l} style={{background:c.bg,borderRadius:14,padding:'14px',border:'0.5px solid rgba(255,255,255,0.06)'}}>
            <div style={{fontSize:11,color:'#94A3B8',marginBottom:6}}>{c.l}</div>
            <div style={{fontSize:20,fontWeight:700,color:c.c}}>{fmtK(c.v)}</div>
          </div>
        ))}
      </div>
      <div style={{background:sM>=0?'rgba(59,130,246,0.1)':'rgba(244,63,94,0.1)',borderRadius:14,padding:'14px',border:'0.5px solid rgba(255,255,255,0.06)',marginBottom:10}}>
        <div style={{fontSize:11,color:'#94A3B8',marginBottom:4}}>Saldo líquido</div>
        <div style={{fontSize:28,fontWeight:700,color:sM>=0?'#3B82F6':'#F43F5E'}}>{fmt(sM)}</div>
      </div>
      {porConta.length>0&&<div style={card}>
        <div style={{fontSize:13,fontWeight:600,marginBottom:10}}>🏦 Por conta bancária</div>
        {porConta.map((c,i)=>(
          <div key={c.conta} style={{padding:'8px 0',borderTop:i>0?'0.5px solid rgba(255,255,255,0.06)':'none'}}>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:13,marginBottom:3}}>
              <span style={{color:'#F1F5F9',fontWeight:500}}>{c.conta}</span>
              <span style={{fontWeight:700,color:c.saldoAtual>=0?'#10B981':'#F43F5E'}}>{fmt(c.saldoAtual)}</span>
            </div>
            <div style={{fontSize:10,color:'#475569',marginBottom:3}}>Saldo atual da conta</div>
            <div style={{display:'flex',gap:10,fontSize:11,color:'#64748B',flexWrap:'wrap'}}>
              <span>Entrada mês: {fmt(c.rec)}</span>
              <span>Saída mês: {fmt(c.desp)}</span>
              {c.transfIn>0&&<span style={{color:'#8B5CF6'}}>Transf. recebida: {fmt(c.transfIn)}</span>}
              {c.transfOut>0&&<span style={{color:'#8B5CF6'}}>Transf. enviada: {fmt(c.transfOut)}</span>}
            </div>
          </div>
        ))}
      </div>}
      <div style={card}>
        <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}><span style={{fontSize:13,color:'#94A3B8'}}>Limite anual MEI</span><span style={{fontSize:13,fontWeight:600,color:lP>90?'#F43F5E':lP>70?'#F59E0B':'#10B981'}}>{lP.toFixed(1)}%</span></div>
        <div style={{background:'rgba(255,255,255,0.08)',borderRadius:4,height:10,overflow:'hidden'}}><div style={{height:10,borderRadius:4,width:lP+'%',background:lP>90?'#F43F5E':lP>70?'#F59E0B':'#10B981',transition:'width 0.4s'}}/></div>
        <div style={{fontSize:11,color:'#64748B',marginTop:6}}>{fmt(rA)} de R$ 81.000</div>
      </div>
      {isWagner&&<>
        <div style={card}>
          <div style={{fontSize:13,fontWeight:600,marginBottom:10}}>Reservas jul/26 ✅</div>
          {[{i:'🛡️',l:'Emergência',v:17000,c:'#3B82F6'},{i:'👶',l:'Bebê (dez)',v:5000,c:'#8B5CF6'}].map(r=>(
            <div key={r.l} style={{marginBottom:10}}>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:13,marginBottom:5}}><span style={{color:'#94A3B8'}}>{r.i} {r.l}</span><span style={{color:r.c,fontWeight:600}}>{fmt(r.v)} ✅</span></div>
              <div style={{background:'rgba(255,255,255,0.08)',borderRadius:4,height:6}}><div style={{height:6,borderRadius:4,width:'100%',background:r.c}}/></div>
            </div>
          ))}
        </div>
        <div style={card}>
          <div style={{fontSize:13,fontWeight:600,marginBottom:10}}>Saídas previstas este mês</div>
          {[{l:'Despesas fixas',v:fixasMes,c:'#F43F5E'},{l:'Cartões (parcelas)',v:cartoesMes,c:'#F59E0B'}].map(r=>(
            <div key={r.l} style={{display:'flex',justifyContent:'space-between',fontSize:14,padding:'6px 0',borderTop:'0.5px solid rgba(255,255,255,0.06)'}}><span style={{color:'#94A3B8'}}>{r.l}</span><span style={{color:r.c,fontWeight:600}}>{fmt(r.v)}</span></div>
          ))}
          <div style={{display:'flex',justifyContent:'space-between',fontSize:15,fontWeight:700,padding:'8px 0 0',borderTop:'1px solid rgba(255,255,255,0.1)',marginTop:4}}><span>Total saídas</span><span style={{color:'#F43F5E'}}>{fmt(fixasMes+cartoesMes)}</span></div>
        </div>
      </>}
      <div style={card}>
        <div style={{fontSize:13,fontWeight:600,marginBottom:10}}>DAS estimado</div>
        {[{l:'INSS (5% sal. mín.)',v:75.90},{l:'ISS fixo (serviços)',v:5}].map(r=>(
          <div key={r.l} style={{display:'flex',justifyContent:'space-between',fontSize:13,padding:'6px 0',borderTop:'0.5px solid rgba(255,255,255,0.06)'}}><span style={{color:'#64748B'}}>{r.l}</span><span>{fmt(r.v)}</span></div>
        ))}
        <div style={{display:'flex',justifyContent:'space-between',fontSize:15,fontWeight:700,padding:'10px 0 0',borderTop:'1px solid rgba(255,255,255,0.1)',marginTop:4}}><span>Total DAS</span><span style={{color:'#3B82F6'}}>{fmt(80.90)}</span></div>
      </div>
      <div style={{height:20}}/>
    </div>
  );
}

// ── Gráficos ─────────────────────────────────────────────────────────
function GraficosTab({entries,mes,ano,sumMes,isWagner}){
  const barRef=useRef(null);
  const pieRef=useRef(null);
  const lineRef=useRef(null);
  const cartoesRef=useRef(null);
  const chartsRef=useRef({});

  // Dados: receita vs despesa últimos 6 meses
  const ultimos6=Array.from({length:6},(_,i)=>{
    const d=new Date(ano,mes-5+i,1);
    return{m:MESES_NOME[d.getMonth()],r:sumMes('income',d.getMonth(),d.getFullYear()),e:sumMes('expense',d.getMonth(),d.getFullYear())};
  });

  // Despesas por categoria mês atual
  const catE=entries.filter(e=>{const d=new Date((e.date||td())+'T12:00:00');return e.kind==='expense'&&d.getMonth()===mes&&d.getFullYear()===ano})
    .reduce((a,e)=>{a[e.category]=(a[e.category]||0)+(e.amount||0);return a},{});
  const catLabels=Object.keys(catE);
  const catValues=Object.values(catE);
  const catColors=['#10B981','#3B82F6','#8B5CF6','#F59E0B','#F43F5E','#06B6D4','#EC4899','#84CC16'];

  // Saldo acumulado ano
  const mesesAno=Array.from({length:mes+1},(_,i)=>{
    const r=sumMes('income',i,ano),e=sumMes('expense',i,ano);
    return{m:MESES_NOME[i],s:r-e};
  });
  let acum=0;
  const acumData=mesesAno.map(m=>{acum+=m.s;return acum});

  // Cartões por mês (só Wagner)
  const cartoesData=isWagner?MESES_PLANO.map((_,i)=>WAGNER_CARTOES.filter(c=>c.meses.includes(i+6)).reduce((s,c)=>s+c.valor,0)):[];

  const chartOpts={responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#94A3B8',font:{size:11}}},tooltip:{callbacks:{label:ctx=>' '+fmt(ctx.raw)}}},scales:{x:{ticks:{color:'#64748B',font:{size:11}},grid:{color:'rgba(255,255,255,0.04)'}},y:{ticks:{color:'#64748B',font:{size:11},callback:v=>fmtK(v)},grid:{color:'rgba(255,255,255,0.06)'}}}};

  useEffect(()=>{
    const destroy=r=>{if(chartsRef.current[r]){chartsRef.current[r].destroy();delete chartsRef.current[r]}};

    // Bar: receita vs despesa
    if(barRef.current){destroy('bar');chartsRef.current.bar=new Chart(barRef.current,{type:'bar',data:{labels:ultimos6.map(m=>m.m),datasets:[{label:'Receita',data:ultimos6.map(m=>m.r),backgroundColor:'rgba(16,185,129,0.7)',borderRadius:6},{label:'Despesa',data:ultimos6.map(m=>m.e),backgroundColor:'rgba(244,63,94,0.7)',borderRadius:6}]},options:{...chartOpts,plugins:{...chartOpts.plugins,title:{display:true,text:'Receita vs Despesa (6 meses)',color:'#F1F5F9',font:{size:13,weight:'600'}}}}});}

    // Pie: categorias
    if(pieRef.current&&catLabels.length>0){destroy('pie');chartsRef.current.pie=new Chart(pieRef.current,{type:'doughnut',data:{labels:catLabels.map(c=>c.charAt(0).toUpperCase()+c.slice(1)),datasets:[{data:catValues,backgroundColor:catColors.slice(0,catLabels.length),borderWidth:0,hoverOffset:8}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{color:'#94A3B8',font:{size:11},padding:12}},title:{display:true,text:'Despesas por categoria',color:'#F1F5F9',font:{size:13,weight:'600'}},tooltip:{callbacks:{label:ctx=>' '+fmt(ctx.raw)+' ('+Math.round(ctx.parsed/catValues.reduce((a,b)=>a+b,0)*100)+'%)'}}}}});}

    // Line: saldo acumulado
    if(lineRef.current){destroy('line');chartsRef.current.line=new Chart(lineRef.current,{type:'line',data:{labels:mesesAno.map(m=>m.m),datasets:[{label:'Saldo acumulado',data:acumData,borderColor:'#3B82F6',backgroundColor:'rgba(59,130,246,0.1)',fill:true,tension:0.4,pointBackgroundColor:'#3B82F6',pointRadius:4}]},options:{...chartOpts,plugins:{...chartOpts.plugins,title:{display:true,text:'Evolução do saldo ('+ano+')',color:'#F1F5F9',font:{size:13,weight:'600'}}}}});}

    // Bar: cartões por mês (Wagner)
    if(cartoesRef.current&&isWagner){destroy('cartoes');chartsRef.current.cartoes=new Chart(cartoesRef.current,{type:'bar',data:{labels:MESES_PLANO,datasets:[{label:'Parcelas',data:cartoesData,backgroundColor:cartoesData.map(v=>v>0?'rgba(245,158,11,0.7)':'rgba(16,185,129,0.3)'),borderRadius:6}]},options:{...chartOpts,plugins:{...chartOpts.plugins,title:{display:true,text:'Cartões por mês (Jul–Dez/26)',color:'#F1F5F9',font:{size:13,weight:'600'}}}}});}

    return()=>{Object.values(chartsRef.current).forEach(c=>c.destroy());chartsRef.current={}};
  },[entries.length,mes,ano]);

  return(
    <div style={{flex:1,overflowY:'auto',padding:'0 16px'}}>
      <div style={{fontSize:18,fontWeight:700,padding:'16px 0 12px'}}>Gráficos</div>

      <div style={{...card,height:240}}>
        <canvas ref={barRef}/>
      </div>

      {catLabels.length>0?<div style={{...card,height:260}}><canvas ref={pieRef}/></div>
      :<div style={{...card,textAlign:'center',padding:'30px',color:'#64748B',fontSize:13}}>
        Adicione despesas para ver o gráfico de categorias 📊
      </div>}

      <div style={{...card,height:220}}>
        <canvas ref={lineRef}/>
      </div>

      {isWagner&&<div style={{...card,height:220}}>
        <canvas ref={cartoesRef}/>
      </div>}

      {isWagner&&<div style={{...card,background:'rgba(245,158,11,0.08)'}}>
        <div style={{fontSize:13,fontWeight:600,marginBottom:10,color:'#F59E0B'}}>🎯 Lazer com a Marcela</div>
        {[{m:'Julho',v:'R$ 0',o:'Mês de execução'},{m:'Agosto',v:'R$ 900',o:'Cartão pesado'},{m:'Set–Nov',v:'R$ 1.200',o:'Saldo maior'},{m:'Dezembro',v:'R$ 1.500+',o:'Zero cartão 🎉'}].map((r,i)=>(
          <div key={i} style={{display:'flex',justifyContent:'space-between',fontSize:13,padding:'6px 0',borderTop:i>0?'0.5px solid rgba(245,158,11,0.15)':'none'}}>
            <span style={{color:'#94A3B8'}}>{r.m} <span style={{fontSize:11,color:'#64748B'}}>· {r.o}</span></span>
            <span style={{fontWeight:600,color:'#F59E0B'}}>{r.v}</span>
          </div>
        ))}
      </div>}
      <div style={{height:20}}/>
    </div>
  );
}

// ── Lançamentos ──────────────────────────────────────────────────────
function EntriesTab({entries,addEntry,delEntry,updateEntry,contas}){
  const [showAdd,setShowAdd]=useState(false);
  const [editId,setEditId]=useState(null);
  const [filtroConta,setFiltroConta]=useState('todas');
  const blank={kind:'income',desc:'',amount:'',category:'servico',date:td(),parcelas:1,conta:contas[0]||'Banco do Brasil',contaOrigem:contas[0]||'Banco do Brasil',contaDestino:contas[1]||contas[0]||'PicPay'};
  const [form,setForm]=useState(blank);
  const sorted=[...entries].filter(e=>filtroConta==='todas'||e.conta===filtroConta||e.contaOrigem===filtroConta||e.contaDestino===filtroConta).sort((a,b)=>new Date(b.date||td())-new Date(a.date||td()));
  const CATS=form.kind==='income'?CAT_INC:CAT_EXP;

  const openNew=()=>{
    setEditId(null);
    setForm({...blank,conta:contas[0]||'Banco do Brasil',contaOrigem:contas[0]||'Banco do Brasil',contaDestino:contas[1]||contas[0]||'PicPay'});
    setShowAdd(true);
  };

  const openEdit=(e)=>{
    setEditId(e.id);
    setForm({kind:e.kind,desc:e.desc,amount:String(e.amount),category:e.category||'servico',date:e.date||td(),parcelas:e.parcelas||1,conta:e.conta||contas[0]||'Banco do Brasil',contaOrigem:e.contaOrigem||contas[0]||'Banco do Brasil',contaDestino:e.contaDestino||contas[1]||contas[0]||'PicPay'});
    setShowAdd(true);
  };

  const closeForm=()=>{
    setShowAdd(false);setEditId(null);
    setForm({...blank,conta:contas[0]||'Banco do Brasil',contaOrigem:contas[0]||'Banco do Brasil',contaDestino:contas[1]||contas[0]||'PicPay'});
  };

  const save=async(keepOpen)=>{
    const currentForm=form;
    if(currentForm.kind==='transfer'){
      if(!currentForm.amount||currentForm.contaOrigem===currentForm.contaDestino)return;
    } else if(currentForm.kind==='balance'){
      if(!currentForm.amount||!currentForm.conta)return;
    } else {
      if(!currentForm.desc||!currentForm.amount)return;
    }

    let data;
    if(currentForm.kind==='transfer'){
      data={kind:'transfer',desc:currentForm.desc||`Transferência ${currentForm.contaOrigem} → ${currentForm.contaDestino}`,amount:parseFloat(currentForm.amount),date:currentForm.date,contaOrigem:currentForm.contaOrigem,contaDestino:currentForm.contaDestino};
    } else if(currentForm.kind==='balance'){
      data={kind:'balance',desc:`Saldo inicial — ${currentForm.conta}`,amount:parseFloat(currentForm.amount),date:currentForm.date,conta:currentForm.conta};
    } else {
      data={...currentForm,amount:parseFloat(currentForm.amount)};
    }
    const existingBalance=currentForm.kind==='balance'&&!editId
      ?entries.find(e=>e.kind==='balance'&&e.conta===currentForm.conta)
      :null;
    const targetId=existingBalance?existingBalance.id:editId;

    // Fecha a UI IMEDIATAMENTE (otimista) — não espera a rede
    if(keepOpen&&!targetId){
      setForm({...blank,kind:currentForm.kind,category:currentForm.kind==='income'?'servico':'moradia',conta:currentForm.conta,contaOrigem:currentForm.contaOrigem,contaDestino:currentForm.contaDestino,date:currentForm.date});
    } else {
      setShowAdd(false);
      setEditId(null);
      setForm({...blank,conta:contas[0]||'Banco do Brasil',contaOrigem:contas[0]||'Banco do Brasil',contaDestino:contas[1]||contas[0]||'PicPay'});
    }

    // Salva em background — Firestore vai sincronizar via onSnapshot
    console.log('Salvando lançamento:',data,'targetId:',targetId);
    try{
      if(targetId){await updateEntry(targetId,data)}
      else{await addEntry(data)}
      console.log('Lançamento salvo com sucesso');
    }catch(err){
      console.error('Erro ao salvar lançamento:',err);
    }
  };

  const KIND_TABS=[['income','📈 Receita','#10B981'],['expense','📉 Despesa','#F43F5E'],['transfer','🔄 Transferência','#8B5CF6'],['balance','🏁 Saldo inicial','#F59E0B']];

  return(
    <div style={{flex:1,overflowY:'auto',padding:'0 16px'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'16px 0 12px'}}>
        <div style={{fontSize:18,fontWeight:700}}>Lançamentos</div>
        <button onClick={()=>showAdd?closeForm():openNew()} style={{width:36,height:36,borderRadius:10,background:showAdd?'#334155':'#10B981',border:'none',display:'flex',alignItems:'center',justifyContent:'center'}}><Ico n="plus" sz={16} c="#fff"/></button>
      </div>

      {showAdd&&<div style={{...card,marginBottom:10,animation:'fadeIn 0.2s ease'}}>
        <div style={{fontSize:13,fontWeight:600,marginBottom:12}}>{editId?'Editar lançamento':'Novo lançamento'}</div>
        <div style={{display:'flex',gap:6,marginBottom:12}}>
          {KIND_TABS.map(([k,l,color])=>(
            <button key={k} onClick={()=>setForm(f=>({...f,kind:k,category:k==='income'?'servico':'moradia'}))} style={{flex:1,padding:'8px 4px',borderRadius:8,border:'none',background:form.kind===k?color+'40':'rgba(255,255,255,0.06)',color:form.kind===k?color:'#94A3B8',fontSize:12,fontWeight:600}}>{l}</button>
          ))}
        </div>

        {form.kind!=='transfer'&&<>
          {[{f:'desc',l:'Descrição',t:'text',p:'Ex: Serviço de design'},{f:'amount',l:'Valor (R$)',t:'number',p:'0,00'}].map(f=>(
            <div key={f.f} style={{marginBottom:10}}><div style={{fontSize:11,color:'#64748B',marginBottom:4}}>{f.l}</div><input type={f.t} value={form[f.f]} onChange={e=>setForm(p=>({...p,[f.f]:e.target.value}))} placeholder={f.p} style={iS}/></div>
          ))}
          <div style={{marginBottom:10}}><div style={{fontSize:11,color:'#64748B',marginBottom:4}}>Categoria</div>
            <select value={form.category} onChange={e=>setForm(p=>({...p,category:e.target.value}))} style={iS}>
              {CATS.map(c=><option key={c.v} value={c.v}>{c.l}</option>)}
            </select>
          </div>
          <div style={{marginBottom:10}}><div style={{fontSize:11,color:'#64748B',marginBottom:4}}>Conta bancária</div>
            <select value={form.conta} onChange={e=>setForm(p=>({...p,conta:e.target.value}))} style={iS}>
              {contas.map(c=><option key={c} value={c}>{c}</option>)}
            </select>
          </div>
          <div style={{marginBottom:10}}><div style={{fontSize:11,color:'#64748B',marginBottom:4}}>Parcelas (opcional)</div>
            <select value={form.parcelas} onChange={e=>setForm(p=>({...p,parcelas:parseInt(e.target.value)}))} style={iS}>
              {Array.from({length:12},(_,i)=>i+1).map(n=><option key={n} value={n}>{n===1?'À vista':n+'x de '+fmt((parseFloat(form.amount)||0)/n)}</option>)}
            </select>
          </div>
        </>}

        {form.kind==='transfer'&&<>
          <div style={{marginBottom:10}}><div style={{fontSize:11,color:'#64748B',marginBottom:4}}>Valor (R$)</div>
            <input type="number" value={form.amount} onChange={e=>setForm(p=>({...p,amount:e.target.value}))} placeholder="0,00" style={iS}/>
          </div>
          <div style={{marginBottom:10}}><div style={{fontSize:11,color:'#64748B',marginBottom:4}}>De (conta origem)</div>
            <select value={form.contaOrigem} onChange={e=>setForm(p=>({...p,contaOrigem:e.target.value}))} style={iS}>
              {contas.map(c=><option key={c} value={c}>{c}</option>)}
            </select>
          </div>
          <div style={{textAlign:'center',color:'#8B5CF6',fontSize:18,margin:'2px 0'}}>↓</div>
          <div style={{marginBottom:10}}><div style={{fontSize:11,color:'#64748B',marginBottom:4}}>Para (conta destino)</div>
            <select value={form.contaDestino} onChange={e=>setForm(p=>({...p,contaDestino:e.target.value}))} style={iS}>
              {contas.map(c=><option key={c} value={c}>{c}</option>)}
            </select>
          </div>
          {form.contaOrigem===form.contaDestino&&<div style={{fontSize:12,color:'#F59E0B',marginBottom:10}}>⚠️ Escolha contas diferentes</div>}
          <div style={{marginBottom:10}}><div style={{fontSize:11,color:'#64748B',marginBottom:4}}>Observação (opcional)</div>
            <input type="text" value={form.desc} onChange={e=>setForm(p=>({...p,desc:e.target.value}))} placeholder="Ex: Reserva de emergência" style={iS}/>
          </div>
        </>}

        {form.kind==='balance'&&<>
          <div style={{background:'rgba(245,158,11,0.1)',border:'0.5px solid rgba(245,158,11,0.3)',borderRadius:8,padding:'10px 12px',marginBottom:12,fontSize:12,color:'#F59E0B'}}>
            🏁 Define o ponto de partida da conta — quanto ela já tinha antes de você começar a lançar aqui. Só existe um saldo inicial por conta; se já tiver um, será atualizado.
          </div>
          <div style={{marginBottom:10}}><div style={{fontSize:11,color:'#64748B',marginBottom:4}}>Conta</div>
            <select value={form.conta} onChange={e=>setForm(p=>({...p,conta:e.target.value}))} style={iS}>
              {contas.map(c=><option key={c} value={c}>{c}</option>)}
            </select>
          </div>
          <div style={{marginBottom:10}}><div style={{fontSize:11,color:'#64748B',marginBottom:4}}>Saldo inicial (R$)</div>
            <input type="number" value={form.amount} onChange={e=>setForm(p=>({...p,amount:e.target.value}))} placeholder="0,00" style={iS}/>
          </div>
        </>}

        <div style={{marginBottom:12}}><div style={{fontSize:11,color:'#64748B',marginBottom:4}}>Data</div><input type="date" value={form.date} onChange={e=>setForm(p=>({...p,date:e.target.value}))} style={iS}/></div>
        <div style={{display:'flex',gap:8}}>
          {editId&&<button onClick={closeForm} style={{flex:1,padding:'12px',background:'rgba(255,255,255,0.06)',border:'none',borderRadius:10,color:'#94A3B8',fontSize:15,fontWeight:600}}>Cancelar</button>}
          {!editId&&<button onClick={()=>save(true)} style={{flex:1,padding:'12px',background:'rgba(255,255,255,0.08)',border:'none',borderRadius:10,color:'#94A3B8',fontSize:13,fontWeight:600,cursor:'pointer'}}>Salvar e novo</button>}
          <button onClick={()=>save(false)} style={{flex:2,padding:'12px',background:form.kind==='transfer'?'#8B5CF6':'#10B981',border:'none',borderRadius:10,color:'#fff',fontSize:15,fontWeight:600,cursor:'pointer'}}>{editId?'Salvar alterações':'Salvar e fechar'}</button>
        </div>
      </div>}

      {contas.length>1&&<div style={{display:'flex',gap:6,marginBottom:12,overflowX:'auto',paddingBottom:2}}>
        <button onClick={()=>setFiltroConta('todas')} style={{flexShrink:0,fontSize:12,padding:'6px 12px',borderRadius:20,border:'none',background:filtroConta==='todas'?'#3B82F6':'rgba(255,255,255,0.06)',color:filtroConta==='todas'?'#fff':'#94A3B8',fontWeight:600}}>Todas contas</button>
        {contas.map(c=>(
          <button key={c} onClick={()=>setFiltroConta(c)} style={{flexShrink:0,fontSize:12,padding:'6px 12px',borderRadius:20,border:'none',background:filtroConta===c?'#3B82F6':'rgba(255,255,255,0.06)',color:filtroConta===c?'#fff':'#94A3B8',fontWeight:600}}>{c}</button>
        ))}
      </div>}

      {sorted.length===0?<div style={{textAlign:'center',padding:'60px 20px',color:'#64748B'}}>
        <div style={{fontSize:40,marginBottom:12}}>📋</div>
        <div style={{fontSize:15}}>Nenhum lançamento ainda</div>
        <div style={{fontSize:13,marginTop:6}}>Toque em + para adicionar</div>
      </div>:sorted.map(e=>{
        const isTransfer=e.kind==='transfer';
        const isBalance=e.kind==='balance';
        const icon=isBalance?'🏁':isTransfer?'🔄':e.kind==='income'?'📈':'📉';
        const bg=isBalance?'rgba(245,158,11,0.15)':isTransfer?'rgba(139,92,246,0.15)':e.kind==='income'?'rgba(16,185,129,0.15)':'rgba(244,63,94,0.15)';
        const color=isBalance?'#F59E0B':isTransfer?'#8B5CF6':e.kind==='income'?'#10B981':'#F43F5E';
        return(
          <div key={e.id} onClick={()=>openEdit(e)} style={{display:'flex',alignItems:'center',gap:12,padding:'12px 0',borderBottom:'0.5px solid rgba(255,255,255,0.06)',animation:'fadeIn 0.15s ease',cursor:'pointer'}}>
            <div style={{width:38,height:38,borderRadius:10,background:bg,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,flexShrink:0}}>{icon}</div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:14,fontWeight:500,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{e.desc}</div>
              <div style={{fontSize:11,color:'#64748B',marginTop:2}}>
                {isTransfer
                  ?`${e.contaOrigem} → ${e.contaDestino} · ${new Date((e.date||td())+'T12:00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'short'})}`
                  :isBalance
                  ?`${e.conta} · ${new Date((e.date||td())+'T12:00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'short'})}`
                  :[e.conta,e.category,e.parcelas>1?e.parcelas+'x':null,new Date((e.date||td())+'T12:00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'short'})].filter(Boolean).join(' · ')}
              </div>
            </div>
            <div style={{fontSize:15,fontWeight:700,color:color,whiteSpace:'nowrap'}}>{isBalance?'🏁':isTransfer?'⇄':e.kind==='income'?'+':'-'} {fmtK(e.amount||0)}</div>
            <button onClick={(ev)=>{ev.stopPropagation();delEntry(e.id)}} style={{background:'none',border:'none',padding:6,borderRadius:6,display:'flex'}}><Ico n="trash" sz={16} c="#64748B"/></button>
          </div>
        );
      })}
      <div style={{height:20}}/>
    </div>
  );
}

// ── Plano ────────────────────────────────────────────────────────────
function PlanTab({checklist,saveCk,feitos,ckP,isWagner}){
  const toggle=i=>{const n=[...checklist];n[i].feito=!n[i].feito;saveCk(n)};
  return(
    <div style={{flex:1,overflowY:'auto',padding:'0 16px'}}>
      <div style={{fontSize:18,fontWeight:700,padding:'16px 0 12px'}}>Plano Jul–Dez/26</div>
      {isWagner&&checklist.length>0&&<>
        <div style={card}>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:10}}><div style={{fontSize:13,fontWeight:600}}>✅ Checklist de julho</div><div style={{fontSize:13,color:'#10B981',fontWeight:600}}>{feitos}/{checklist.length}</div></div>
          <div style={{background:'rgba(255,255,255,0.08)',borderRadius:4,height:6,marginBottom:14,overflow:'hidden'}}><div style={{height:6,borderRadius:4,width:ckP+'%',background:ckP===100?'#10B981':'#3B82F6',transition:'width 0.4s'}}/></div>
          {checklist.map((c,i)=>(
            <div key={i} onClick={()=>toggle(i)} style={{display:'flex',gap:12,padding:'10px 0',borderTop:i>0?'0.5px solid rgba(255,255,255,0.06)':'none',cursor:'pointer',alignItems:'flex-start'}}>
              <div style={{width:22,height:22,borderRadius:'50%',border:c.feito?'none':'1.5px solid #334155',background:c.feito?'#10B981':'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,marginTop:1}}>
                {c.feito&&<Ico n="check" sz={12} c="#fff"/>}
              </div>
              <div><div style={{fontSize:13,fontWeight:500,color:c.feito?'#64748B':'#F1F5F9',textDecoration:c.feito?'line-through':'none'}}>{c.a}</div><div style={{fontSize:11,color:c.feito?'#10B981':'#64748B',marginTop:2}}>{c.i}</div></div>
            </div>
          ))}
          {ckP===100&&<div style={{marginTop:12,background:'rgba(16,185,129,0.15)',borderRadius:8,padding:'10px',textAlign:'center',fontSize:14,fontWeight:600,color:'#10B981'}}>🎉 Julho executado! Você mudou sua vida financeira.</div>}
        </div>
        <div style={card}>
          <div style={{fontSize:13,fontWeight:600,marginBottom:14}}>Saldo livre por mês</div>
          {MESES_PLANO.map((m,i)=>{const max=Math.max(...SALDOS_PLANO),pct=(SALDOS_PLANO[i]/max)*100;return(
            <div key={i} style={{marginBottom:12}}>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:13,marginBottom:4}}>
                <span style={{color:'#94A3B8',display:'flex',gap:6,alignItems:'center'}}>{m}{i===5&&<span style={{fontSize:10,background:'rgba(139,92,246,0.2)',color:'#8B5CF6',padding:'1px 6px',borderRadius:20}}>👶</span>}{i===5&&<span style={{fontSize:10,background:'rgba(16,185,129,0.2)',color:'#10B981',padding:'1px 6px',borderRadius:20}}>zero cartão</span>}</span>
                <span style={{fontWeight:600,color:SALDOS_PLANO[i]>4000?'#10B981':'#F59E0B'}}>{fmt(SALDOS_PLANO[i])}</span>
              </div>
              <div style={{background:'rgba(255,255,255,0.08)',borderRadius:4,height:6}}><div style={{height:6,borderRadius:4,width:pct.toFixed(1)+'%',background:i===0?'#3B82F6':'#10B981'}}/></div>
            </div>
          )})}
        </div>
        <div style={card}>
          <div style={{fontSize:13,fontWeight:600,marginBottom:12}}>Dívidas em dez/26</div>
          {[{l:'Moto (R$ 44k)',s:'✅ Eliminada em julho',c:'#10B981'},{l:'MEI (R$ 4k)',s:'✅ Quitado em julho',c:'#10B981'},{l:'Cartão Militão',s:'⏳ Encerra out/26',c:'#F59E0B'},{l:'Cartão Roger',s:'⏳ Encerra nov/26',c:'#F59E0B'},{l:'Cartão Ebó',s:'⏳ Encerra out/26',c:'#F59E0B'}].map((d,i)=>(
            <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',fontSize:13,padding:'7px 0',borderTop:i>0?'0.5px solid rgba(255,255,255,0.06)':'none'}}>
              <span style={{color:'#94A3B8'}}>{d.l}</span><span style={{color:d.c,fontWeight:500,fontSize:12}}>{d.s}</span>
            </div>
          ))}
          <div style={{marginTop:12,background:'rgba(16,185,129,0.12)',borderRadius:8,padding:'10px',textAlign:'center',fontSize:13,fontWeight:600,color:'#10B981'}}>Dezembro: zero dívidas + R$ 22k em reservas 🎉</div>
        </div>
      </>}
      {!isWagner&&<div style={{...card,textAlign:'center',padding:'40px 20px',color:'#64748B'}}>
        <div style={{fontSize:36,marginBottom:12}}>📋</div>
        <div style={{fontSize:14}}>Use Lançamentos para registrar suas receitas e despesas. Os gráficos e painel atualizam automaticamente.</div>
      </div>}
      <div style={{height:20}}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
